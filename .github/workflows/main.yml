name: Vanguard Bot 24/7

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # ৬ ঘণ্টা ১৫ মিনিট ব্যবধানে দিনে ৪ বার রান হবে (UTC অনুযায়ী)
    - cron: '0 0 * * *'      # রাত ১২:০০
    - cron: '15 6 * * *'     # সকাল ৬:১৫
    - cron: '30 12 * * *'    # দুপুর ১২:৩০
    - cron: '45 18 * * *'    # সন্ধ্যা ৬:৪৫

# এটি যোগ করলে আগের রানিং বটটি বন্ধ হয়ে নতুনটি চালু হবে, সেশন কনফ্লিক্ট হবে না
concurrency:
  group: vanguard-bot
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 370 # প্রায় ৬ ঘণ্টা ১০ মিনিট

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Start Bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
        run: python main.py
