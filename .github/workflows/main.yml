name: Vanguard Bot 24/7

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # এটি প্রতি ৫ ঘণ্টা পর পর বটটিকে রিস্টার্ট দিবে
    - cron: '0 */5 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    # এখানে ১টি সেশন যেন অন্যটির সাথে কনফ্লিক্ট না করে তাই timeout দেয়া ভালো
    timeout-minutes: 350 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Start Bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
        run: python main.py
